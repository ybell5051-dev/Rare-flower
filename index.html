<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTHEFLARE // RARE FLOWERS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: sans-serif;
        }

        /* Hero Header Section */
        .hero-header {
            width: 100%;
        }
        .hero-header img {
            width: 100%;
            display: block;
        }

        /* Content Sections */
        .content-section {
            padding: 40px 10%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .img-display {
            max-width: 100%;
            height: auto;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- Hero Header: Using IMG_3892.jpeg as the full header design -->
    <header class="hero-header">
        <img src="assets/images/IMG_3892.jpeg" alt="Xtheflare Landing Header">
    </header>

    <!-- Artist Section: Using IMG_0330.jpeg -->
    <section class="content-section">
        <img src="assets/images/IMG_0330.jpeg" alt="Xtheflare in truck" class="img-display">
    </section>

    <!-- Album Section: Using 226B7D86-1282-4FE6-8D02-0426694527CD.jpeg -->
    <section class="content-section">
        <h2>THE ALBUM</h2>
        <img src="assets/images/226B7D86-1282-4FE6-8D02-0426694527CD.jpeg" alt="Rare Flowers Cover" class="img-display">
    </section>

</body>
</html>
